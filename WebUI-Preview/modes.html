<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PS2-EtherDrive Preview - Modes</title>
  <link rel="stylesheet" href="assets/etherdrive.css">
</head>
<body data-page="modes">
  <div class="shell">
    <header class="hero">
      <p class="eyebrow">Game service profiles</p>
      <div class="hero__title-row">
        <div>
          <h1>Mode Selection</h1>
          <p class="hero__subtitle">Switch between WiFi Only, UDPBD, SMB1, and UDPFS preview profiles.</p>
        </div>
        <span class="badge">Preview only</span>
      </div>
    </header>

    <nav class="nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="setup.html">Setup</a>
      <a href="status.html">Status</a>
      <a href="modes.html" class="active">Modes</a>
      <a href="storage.html">Storage</a>
      <a href="update.html">Update</a>
    </nav>

    <main class="layout layout--two-column">
      <section class="panel">
        <div class="panel__header">
          <div>
            <p class="panel__kicker">Primary control</p>
            <h2>Mode Dropdown</h2>
          </div>
        </div>
        <form id="modeForm" class="form-grid">
          <label>
            <span>Active Mode</span>
            <select id="modeSelect" name="modeSelect">
              <option value="wifi_only">WiFi Only</option>
              <option value="udpbd">UDPBD</option>
              <option value="smb1">SMB1</option>
              <option value="udpfs">UDPFS</option>
            </select>
          </label>
          <div class="form-actions">
            <button type="submit" class="button">Apply Mode · Preview only</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="panel__header">
          <div>
            <p class="panel__kicker">Quick buttons</p>
            <h2>Direct Mode Actions</h2>
          </div>
        </div>
        <div class="button-stack">
          <button type="button" class="button mode-button" data-mode="wifi_only">WiFi Only</button>
          <button type="button" class="button mode-button" data-mode="udpbd">UDPBD</button>
          <button type="button" class="button mode-button" data-mode="smb1">SMB1</button>
          <button type="button" class="button mode-button" data-mode="udpfs">UDPFS</button>
        </div>
      </section>

      <section class="panel panel--wide">
        <div class="panel__header">
          <div>
            <p class="panel__kicker">Mode details</p>
            <h2>Selected Profile</h2>
          </div>
        </div>
        <div id="modeDetails" class="mode-detail-list"></div>
        <p class="message" id="message" aria-live="polite"></p>
      </section>
    </main>
  </div>

  <script src="assets/etherdrive.js"></script>
</body>
</html>
