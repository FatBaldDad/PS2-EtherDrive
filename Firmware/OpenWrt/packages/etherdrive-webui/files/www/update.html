<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EtherDrive - Firmware Update</title>
  <link rel="stylesheet" href="/assets/etherdrive.css">
</head>
<body data-page="update">
  <header class="topbar">
    <h1>OTA Firmware Update</h1>
    <p>Safe stub for future sysupgrade integration</p>
  </header>

  <nav class="nav">
    <a href="/index.html">Home</a>
    <a href="/setup.html">Setup</a>
    <a href="/status.html">Status</a>
    <a href="/storage.html">Storage</a>
    <a href="/update.html" class="active">Update</a>
  </nav>

  <main class="panel">
    <h2>Firmware</h2>
    <div id="updateStatus" class="grid"></div>

    <form id="updateForm">
      <label for="firmware_image">Firmware Image</label>
      <input id="firmware_image" name="firmware_image" type="file" disabled>
      <button type="button" id="verifyBtn">Verify (Placeholder)</button>
      <button type="button" id="flashBtn">Flash/Update (Placeholder)</button>
      <label><input id="reboot_after" name="reboot_after" type="checkbox" checked> Reboot after update</label>
    </form>

    <p class="warn">Warning: OTA update workflow is a placeholder in this version. No live flashing is performed.</p>
    <p id="message" class="message"></p>
  </main>

  <script src="/assets/etherdrive.js"></script>
</body>
</html>
